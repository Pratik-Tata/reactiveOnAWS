version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: demo-k8s
    IMAGE_TAG: latest
    AWS_REGION: ap-south-1

phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin <your-account-id>.dkr.ecr.$AWS_REGION.amazonaws.com

  build:
    commands:
      - echo Build started
      - mvn clean package
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .

  post_build:
    commands:
      - echo Tagging and pushing image
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG 366183011557.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
      - docker push 366183011557.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG

artifacts:
  files:
    - '**/*'